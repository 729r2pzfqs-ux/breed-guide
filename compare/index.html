            { slug: "shikoku", name: "Shikoku", size: "Medium", weight: "15-25 kg", lifespan: "10-12 years", energy: 4, grooming: 3, family: 3, trainability: 3 },
            { slug: "thai-ridgeback", name: "Thai Ridgeback", size: "Medium", weight: "23-34 kg", lifespan: "12-13 years", energy: 4, grooming: 1, family: 3, trainability: 3 },
            { slug: "xoloitzcuintli", name: "Xoloitzcuintli", size: "Medium", weight: "4-25 kg", lifespan: "13-18 years", energy: 3, grooming: 1, family: 4, trainability: 4 },
            { slug: "peruvian-inca-orchid", name: "Peruvian Inca Orchid", size: "Medium", weight: "4-25 kg", lifespan: "12-14 years", energy: 3, grooming: 1, family: 4, trainability: 4 },
            { slug: "entlebucher-mountain-dog", name: "Entlebucher Mountain Dog", size: "Medium", weight: "20-30 kg", lifespan: "11-13 years", energy: 4, grooming: 2, family: 4, trainability: 4 }
        ];

        // Populate dropdowns
        function populateDropdowns() {
            const selects = ['breed1', 'breed2', 'breed3'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                breeds.forEach(breed => {
                    const option = document.createElement('option');
                    option.value = breed.slug;
                    option.textContent = breed.name;
                    select.appendChild(option);
                });
            });
        }

        function setBreeds(slug1, slug2, slug3 = '') {
            document.getElementById('breed1').value = slug1;
            document.getElementById('breed2').value = slug2;
            document.getElementById('breed3').value = slug3;
            updateComparison();
        }

        function updateComparison() {
            const slugs = [
                document.getElementById('breed1').value,
                document.getElementById('breed2').value,
                document.getElementById('breed3').value
            ].filter(s => s);

            if (slugs.length < 2) {
                document.getElementById('comparison-container').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('comparison-container').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            const selected = slugs.map(s => breeds.find(b => b.slug === s));

            // Build header
            const header = document.getElementById('comparison-header');
            header.innerHTML = `
                <tr class="bg-gradient-to-r from-sky-50 to-violet-50">
                    <th class="p-4 text-left font-semibold text-slate-600">Trait</th>
                    ${selected.map(b => `
                        <th class="p-4 text-center">
                            <a href="../breeds/${b.slug}.html" class="font-bold text-lg hover:text-sky-600 transition">${b.name}</a>
                        </th>
                    `).join('')}
                </tr>
            `;

            // Build body
            const traits = [
                { label: "Size", key: "size" },
                { label: "Weight", key: "weight" },
                { label: "Lifespan", key: "lifespan" },
                { label: "Energy Level", key: "energy", isRating: true },
                { label: "Grooming Needs", key: "grooming", isRating: true },
                { label: "Family Friendly", key: "family", isRating: true },
                { label: "Trainability", key: "trainability", isRating: true }
            ];

            const body = document.getElementById('comparison-body');
            body.innerHTML = traits.map((trait, i) => `
                <tr class="${i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}">
                    <td class="p-4 font-medium text-slate-700">${trait.label}</td>
                    ${selected.map(b => `
                        <td class="p-4 text-center">
                            ${trait.isRating ? renderRating(b[trait.key]) : b[trait.key]}
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }

        function renderRating(value) {
            const filled = '★'.repeat(value);
            const empty = '☆'.repeat(5 - value);
            return `<span class="text-amber-400">${filled}</span><span class="text-slate-300">${empty}</span>`;
        }

        // Init
        populateDropdowns();
    </script>
</body>
</html>
