<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found | BreedFinder</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        :root{--primary:#8B5CF6;--bg:#faf5ff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
        header{background:#fff;border-bottom:1px solid var(--border);padding:1rem 0}
        .container{max-width:900px;margin:0 auto;padding:0 1rem}
        .logo{font-weight:700;font-size:1.25rem;color:var(--primary);text-decoration:none}
        main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem 1rem}
        .code{font-size:7rem;font-weight:800;color:#e2e8f0;line-height:1}
        h1{font-size:1.75rem;margin:1rem 0 0.5rem}
        p{color:var(--muted);max-width:420px;margin:0 auto 2rem}
        .buttons{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap}
        .buttons a{padding:0.75rem 1.5rem;border-radius:0.5rem;text-decoration:none;font-weight:600;font-size:0.95rem}
        .btn-primary{background:var(--primary);color:white}
        .btn-outline{border:1px solid var(--border);color:var(--text)}
        .btn-outline:hover{border-color:var(--primary)}
        footer{border-top:1px solid var(--border);padding:1.5rem 0;text-align:center;color:var(--muted);font-size:0.85rem}
    </style>

    <!-- Hreflang -->
    <link rel="alternate" hreflang="en" href="https://breedfinder.org/404.html">
    <link rel="alternate" hreflang="x-default" href="https://breedfinder.org/404.html">
</head>
<body>
    <header><div class="container"><a href="/" class="logo">🐕 BreedFinder</a></div></header>
    <main>
        <div>
            <div class="code">404</div>
            <h1>Page Not Found</h1>
            <p>The breed or page you're looking for doesn't exist. Try our quiz to find your perfect match!</p>
            <div class="buttons">
                <a href="/quiz/" class="btn-primary">Take the Quiz</a>
                <a href="/breeds/" class="btn-outline">Browse Breeds</a>
                <a href="/compare/" class="btn-outline">Compare Breeds</a>
            </div>
        </div>
    </main>
    <footer><div class="container">© 2026 BreedFinder.org</div></footer>

<div id="gdpr-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;color:#fff;padding:12px 20px;z-index:10000;text-align:center;font-size:14px;">
  We use analytics to improve your experience. By clicking Accept, you consent to our use of analytics.
  <button onclick="acceptGA()" style="background:#6366f1;color:#fff;border:none;padding:6px 16px;border-radius:6px;margin-left:10px;cursor:pointer;">Accept</button>
  <button onclick="declineGA()" style="background:transparent;color:#aaa;border:1px solid #555;padding:6px 16px;border-radius:6px;margin-left:6px;cursor:pointer;">Decline</button>
</div>
<script>
function loadGA(){var s=document.createElement('script');s.src='https://www.googletagmanager.com/gtag/js?id=G-VEERQZ53LZ';s.async=true;document.head.appendChild(s);window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-VEERQZ53LZ');}
function acceptGA(){localStorage.setItem('breedfinder-consent','yes');document.getElementById('gdpr-banner').style.display='none';loadGA();}
function declineGA(){localStorage.setItem('breedfinder-consent','no');document.getElementById('gdpr-banner').style.display='none';}
if(localStorage.getItem('breedfinder-consent')==='yes'){loadGA();}else if(!localStorage.getItem('breedfinder-consent')){document.getElementById('gdpr-banner').style.display='block';}
</script>
</body>
</html>
