    <path d="M35 75 Q30 70 25 72 Q20 78 22 85"/>
    <path d="M35 75 Q32 78 30 85 Q28 90 32 95"/>
    <path d="M35 75 Q38 82 36 90 Q35 95 40 98"/>
    <path d="M40 70 Q45 78 42 88"/>
    <!-- Neck fur detail -->
    <path d="M50 62 Q48 68 45 72"/>
    <path d="M55 58 Q52 65 50 70"/>
    <!-- Eye -->
    <circle cx="58" cy="35" r="3" fill="#1a5f2a"/>
    <!-- Brow detail -->
    <path d="M50 30 Q55 28 62 30"/>
    <!-- Head fur detail -->
    <path d="M40 22 Q42 26 40 30"/>
    <path d="M45 20 Q48 24 46 28"/>
  </g>
</svg>
