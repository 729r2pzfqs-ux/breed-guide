<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Dog head side profile -->
  <g fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head outline - from forehead down to snout -->
    <path d="M25 55 
             Q25 35 40 30 
             Q50 28 55 32
             L72 45
             Q78 48 78 55
             Q78 60 72 62
             L55 62
             Q45 62 40 68
             Q35 72 30 72
             Q25 70 25 65
             Z"/>
    
    <!-- Ear -->
    <path d="M40 30 Q35 15 50 18 Q55 20 55 32"/>
    
    <!-- Eye -->
    <circle cx="48" cy="42" r="4" fill="white"/>
    
    <!-- Nose -->
    <circle cx="75" cy="52" r="5" fill="white"/>
    
    <!-- Mouth line -->
    <path d="M72 62 Q68 66 60 65"/>
  </g>
</svg>
