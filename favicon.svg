<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Cute dog face -->
  <!-- Pointed ears -->
  <path d="M25 25 L35 50 L20 50 Z" fill="white"/>
  <path d="M75 25 L65 50 L80 50 Z" fill="white"/>
  <!-- Inner ears -->
  <path d="M28 32 L34 48 L24 48 Z" fill="#fbbf24"/>
  <path d="M72 32 L66 48 L76 48 Z" fill="#fbbf24"/>
  
  <!-- Face -->
  <ellipse cx="50" cy="58" rx="26" ry="22" fill="white"/>
  
  <!-- Eyes -->
  <circle cx="40" cy="54" r="5" fill="#1e293b"/>
  <circle cx="60" cy="54" r="5" fill="#1e293b"/>
  <circle cx="42" cy="52" r="2" fill="white"/>
  <circle cx="62" cy="52" r="2" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="66" rx="5" ry="4" fill="#1e293b"/>
  
  <!-- Mouth -->
  <path d="M45 72 Q50 78 55 72" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Tongue -->
  <ellipse cx="50" cy="76" rx="4" ry="5" fill="#f472b6"/>
