<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Raças | BreedFinder</title>
    <meta name="description" content="Descubra qual raça de cachorro combina perfeitamente com seu estilo de vida. Compare características, faça nosso quiz e encontre seu companheiro peludo ideal.">
    <link rel="canonical" href="https://breedfinder.org/pt/search/">
    <link rel="icon" href="../../favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .breed-card { transition: transform 0.2s, box-shadow 0.2s; }
        .breed-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="../" class="flex items-center gap-2">
                <img src="../../logo-192.png" class="w-10 h-10" alt="BreedFinder">
                <span class="font-bold text-xl text-slate-800">BreedFinder</span>
            </a>
            <nav class="flex items-center gap-4 text-sm font-medium">
                <a href="../" class="text-slate-600 hover:text-sky-600">Início</a>
                <a href="./" class="text-sky-600 font-semibold">Ver Raças</a>
                <a href="../quiz/" class="text-slate-600 hover:text-sky-600">Fazer Quiz</a>
                <div class="relative group">
                    <button class="flex items-center gap-1 text-slate-600"><i data-lucide="globe" class="w-4 h-4"></i><span class="hidden md:inline">PT</span></button>
                    <div class="absolute right-0 top-full mt-2 bg-white border rounded-xl shadow-xl hidden group-hover:block min-w-[140px] py-2 z-50">
                        <a href="../../search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">English</a>
                        <a href="../../es/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Español</a><a href="../../de/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Deutsch</a><a href="../../fr/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Français</a><a href="../../it/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Italiano</a><a href="../../pt/search/" class="block px-4 py-2 hover:bg-slate-100 font-semibold text-sky-600">Português</a><a href="../../nl/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Nederlands</a><a href="../../pl/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Polski</a><a href="../../zh/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">中文</a><a href="../../ja/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">日本語</a><a href="../../fi/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Suomi</a><a href="../../sv/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Svenska</a><a href="../../no/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Norsk</a><a href="../../da/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Dansk</a><a href="../../ru/search/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Русский</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-800 mb-3">Encontre Sua Raça de Cachorro Perfeita</h1>
            <p class="text-slate-600 text-lg">Encontre raças que se adequam ao seu espaço</p>
        </div>

        <div class="max-w-2xl mx-auto mb-8">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Buscar raças..." class="w-full pl-12 pr-4 py-4 rounded-xl border border-slate-200 bg-white shadow-sm focus:ring-2 focus:ring-sky-500 text-lg" autocomplete="off">
                <div id="search-dropdown" class="absolute top-full left-0 right-0 mt-2 bg-white border rounded-2xl shadow-xl z-50 hidden max-h-80 overflow-y-auto"></div>
            </div>
        </div>

        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <button id="resetFilters" class="text-sm text-sky-600 hover:text-sky-700">Reset</button>
                <span id="breedCount" class="text-slate-500 text-sm">220 breeds</span>
            </div>
            <select id="sortBy" class="border border-slate-200 rounded-lg px-3 py-2 text-sm">
                <option value="name">A-Z</option>
                <option value="popularity">Popularity</option>
            </select>
        </div>

        <div id="breedsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Breeds loaded via JS -->
        </div>
    </main>

    <script>
        lucide.createIcons();
        let allBreeds = [];
        
        async function loadBreeds() {
            const response = await fetch('../../data/breeds.json');
            allBreeds = await response.json();
            renderBreeds(allBreeds);
        }
        
        function renderBreeds(breeds) {
            const grid = document.getElementById('breedsGrid');
            document.getElementById('breedCount').textContent = breeds.length + ' breeds';
            
            const sizeColors = {
                tiny: 'bg-purple-100 text-purple-700',
                small: 'bg-blue-100 text-blue-700',
                medium: 'bg-green-100 text-green-700',
                large: 'bg-orange-100 text-orange-700',
                giant: 'bg-red-100 text-red-700'
            };
            
            grid.innerHTML = breeds.map(breed => `
                <a href="../../breeds/${breed.id}.html" class="breed-card bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="aspect-[4/5] bg-slate-100 relative overflow-hidden">
                        <img src="../../images/breeds/${breed.id}.webp" alt="${breed.name}" class="w-full h-full object-cover object-top" onerror="this.src='../../images/heads/${breed.id}.webp'">
                        <span class="absolute top-2 right-2 tag ${sizeColors[breed.size.category] || 'bg-slate-100'}">${breed.size.category}</span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold text-slate-800 text-lg mb-1">${breed.name}</h3>
                        <p class="text-slate-500 text-sm">${breed.origin} · ${breed.lifespan}</p>
                    </div>
                </a>
            `).join('');
        }
        
        document.getElementById('searchInput').addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            if (!query) {
                renderBreeds(allBreeds);
                document.getElementById('search-dropdown').classList.add('hidden');
                return;
            }
            
            const matches = allBreeds.filter(b => 
                b.name.toLowerCase().includes(query) || 
                b.temperament.some(t => t.toLowerCase().includes(query))
            );
            renderBreeds(matches);
            
            // Show dropdown
            const dropdown = document.getElementById('search-dropdown');
            const topMatches = matches.slice(0, 6);
            if (topMatches.length > 0) {
                dropdown.innerHTML = topMatches.map(b => `
                    <a href="../../breeds/${b.id}.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 border-b last:border-0">
                        <img src="../../images/heads/${b.id}.webp" class="w-10 h-10 rounded-xl object-cover">
                        <div><div class="font-medium text-slate-800">${b.name}</div><div class="text-sm text-slate-500">${b.group}</div></div>
                    </a>
                `).join('');
                dropdown.classList.remove('hidden');
            } else {
                dropdown.classList.add('hidden');
            }
        });
        
        document.getElementById('resetFilters').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            renderBreeds(allBreeds);
        });
        
        document.getElementById('sortBy').addEventListener('change', function() {
            const sorted = [...allBreeds].sort((a, b) => a.name.localeCompare(b.name));
            renderBreeds(sorted);
        });
        
        document.addEventListener('click', (e) => {
            const input = document.getElementById('searchInput');
            const dropdown = document.getElementById('search-dropdown');
            if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
        
        loadBreeds();
    </script>
</body>
</html>
