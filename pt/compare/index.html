<body class="bg-gradient-to-br from-sky-50 via-white to-blue-50 min-h-screen text-slate-800">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="../" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-sky-500 to-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-sky-500/20">
                    <img src="../../logo-192.png" class="w-10 h-10" alt="BreedFinder">
                </div>
                <span class="text-xl font-bold bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent">BreedFinder</span>
            </a>
            <nav class="flex items-center gap-4 text-sm font-medium">
                <a href="../search/" class="text-slate-600 hover:text-sky-700 transition hidden md:inline">Todas as Raças</a>
                <div class="relative">
                    <select onchange="if(this.value) window.location.href=this.value" class="appearance-none bg-transparent border border-slate-200 rounded-lg px-3 py-2 pr-8 text-sm cursor-pointer hover:border-sky-400 focus:outline-none focus:border-sky-400">
                        <option value="../../compare/">English</option>

                        <option value="../../fi/compare/">Suomi</option>
                        <option value="../../sv/compare/">Svenska</option>
                        <option value="../../nl/compare/">Nederlands</option>
                        <option value="../../da/compare/">Dansk</option>
                        <option value="../../ja/compare/">日本語</option>
                        <option value="../../no/compare/">Norsk</option>
                        <option value="../../pl/compare/">Polski</option>
                        <option value="../../ru/compare/">Русский</option>
                        <option value="../../tr/compare/">Türkçe</option>
                        <option value="../../zh/compare/">中文</option>
                    </select>
                    <svg class="w-4 h-4 absolute right-2 top-1/2 -translate-y-1/2 text-slate-600 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <a href="../quiz/" class="bg-gradient-to-r from-sky-500 to-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold hover:shadow-lg hover:shadow-sky-500/25 transition hidden md:inline">Fazer Teste</a>
            </nav>
        </div>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4">
                Comparar
                <span class="bg-gradient-to-r from-sky-500 to-blue-600 bg-clip-text text-transparent">Raças</span>
            </h1>
            <p class="text-lg text-slate-600">Selecione até 3 raças para comparar lado a lado</p>
        </div>

        <!-- Breed Selectors -->
        <div class="grid md:grid-cols-3 gap-4 mb-10">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Raça 1</label>
                <select id="breed1" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-sky-400 focus:outline-none bg-white">
                    <option value="">Selecionar uma raça...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Raça 2</label>
                <select id="breed2" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-sky-400 focus:outline-none bg-white">
                    <option value="">Selecionar uma raça...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Raça 3 (opcional)</label>
                <select id="breed3" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-sky-400 focus:outline-none bg-white">
                    <option value="">Selecionar uma raça...</option>
                </select>
            </div>
        </div>

        <!-- Comparison Table -->
        <div id="comparison-container" class="hidden">
            <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden">
                <table class="w-full">
                    <thead id="comparison-header">
                    </thead>
                    <tbody id="comparison-body">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-20">
            <div class="text-6xl mb-4">🐕</div>
            <h3 class="text-xl font-bold text-slate-700 mb-2">Selecione raças para comparar</h3>
            <p class="text-slate-600">Escolha pelo menos 2 raças nos menus acima</p>
        </div>

        <!-- Popular Comparisons -->
        <div class="mt-16">
            <h2 class="text-2xl font-bold mb-6">Comparações Populares</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                <button onclick="setBreeds('labrador-retriever', 'golden-retriever')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Labrador vs Golden Retriever</span>
                    <p class="text-sm text-slate-600">Dois favoritos americanos</p>
                </button>
                <button onclick="setBreeds('french-bulldog', 'bulldog')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">French Buldogue Inglês vs Buldogue Inglês</span>
                    <p class="text-sm text-slate-600">Companheiros compactos</p>
                </button>
                <button onclick="setBreeds('german-shepherd', 'belgian-malinois')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Pastor Alemão vs Malinois</span>
                    <p class="text-sm text-slate-600">Confronto de cães de trabalho</p>
                </button>
                <button onclick="setBreeds('siberian-husky', 'alaskan-malamute')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Husky vs Malamute</span>
                    <p class="text-sm text-slate-600">Batalha de raças árticas</p>
                </button>
                <button onclick="setBreeds('shih-tzu', 'maltese')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Shih Tzu vs Maltês</span>
                    <p class="text-sm text-slate-600">Lendas dos cães de colo</p>
                </button>
                <button onclick="setBreeds('poodle', 'bichon-frise')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Caniche vs Bichon Frisé</span>
                    <p class="text-sm text-slate-600">Escolhas hipoalergênicas</p>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-100 mt-16 py-8">
        <div class="max-w-6xl mx-auto px-4 text-center text-slate-600 text-sm">
            <p>© 2026 BreedFinder. Helping you find your perfect companion.</p>
        </div>
    </footer>

    <script src="../../data/i18n.js"></script>
    <script src="../../data/breeds-compare.js"></script>
    <script>
        // Dark mode removed
        const pageLang = "pt";
        let breedNames = {};
        
        // Populate breed selectors
        const selects = ['breed1', 'breed2', 'breed3'];
        // Load translated breed names
        fetch('../../data/breed_names_pt.json')
            .then(r => r.json())
            .then(names => { breedNames = names; populateSelectors(); applyUrlParams(); })
            .catch(() => { populateSelectors(); applyUrlParams(); });
        
        function getLocalBreedName(breed) {
            return breedNames[breed.slug] || breed.name;
        }

        // Ensure breeds are populated even if fetch fails
        
        
        // Handle URL parameters
        function applyUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const breed1 = params.get('breed1');
            const breed2 = params.get('breed2');
            const breed3 = params.get('breed3');
            
            if (breed1) document.getElementById('breed1').value = breed1;
            if (breed2) document.getElementById('breed2').value = breed2;
            if (breed3) document.getElementById('breed3').value = breed3;
            
            if (breed1 || breed2) updateComparison();
        }

        // Ensure breeds are populated even if fetch fails

        function populateSelectors() {
            selects.forEach(id => {
                const select = document.getElementById(id);
                breeds.forEach(breed => {
                    const option = document.createElement('option');
                    option.value = breed.slug;
                    option.textContent = getLocalBreedName(breed);
                    select.appendChild(option);
                });
            });
        }

        // Ensure breeds are populated even if fetch fails
        
        function setBreeds(slug1, slug2) {
            document.getElementById('breed1').value = slug1;
            document.getElementById('breed2').value = slug2;
            document.getElementById('breed3').value = '';
            updateComparison();
        }

        // Ensure breeds are populated even if fetch fails
        
        function updateComparison() {
            const selected = selects
                .map(id => document.getElementById(id).value)
                .filter(v => v)
                .map(slug => breeds.find(b => b.slug === slug))
                .filter(b => b);
            
            if (selected.length < 2) {
                document.getElementById('comparison-container').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

        // Ensure breeds are populated even if fetch fails
            
            document.getElementById('comparison-container').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            
            // Build header
            const header = document.getElementById('comparison-header');
            header.innerHTML = `
                <tr class="bg-gradient-to-r from-sky-500 to-blue-600 text-white">
                    <th class="p-4 text-left font-semibold">Atributo</th>
                    ${selected.map(b => `
                        <th class="p-4 text-center">
                            <img src="${b.image}" alt="${b.name}" class="w-16 h-16 rounded-full mx-auto mb-2 object-cover bg-white">
                            <div class="font-bold">${getLocalBreedName(b)}</div>
                        </th>
                    `).join('')}
                </tr>
            `;
            
            // Build comparison rows
            const attrs = [
                ['Tamanho', 'size'],
                ['Altura', 'height'],
                ['Peso', 'weight'],
                ['Expectativa de vida', 'lifespan'],
                ['Origem', 'origin'],
                ['Energia', 'energy', true],
                ['Cuidados', 'grooming', true],
                ['Treinabilidade', 'trainability', true],
                ['Amigável com crianças', 'kidFriendly', true],
                ['Apartamento', 'apartment', true],
            ];
            
            const body = document.getElementById('comparison-body');
            body.innerHTML = attrs.map(([label, key, isRating], i) => `
                <tr class="${i % 2 === 0 ? 'bg-slate-50' : 'bg-white'}">
                    <td class="p-4 font-medium text-slate-700">${label}</td>
                    ${selected.map(b => `
                        <td class="p-4 text-center">
                            ${isRating ? `
                                <div class="flex justify-center gap-0.5">
                                    ${[1,2,3,4,5].map(n => `
                                        <div class="w-2 h-6 rounded-full ${n <= b[key] ? 'bg-gradient-to-t from-sky-500 to-blue-600' : 'bg-slate-200'}"></div>
                                    `).join('')}
                                </div>
                            ` : b[key]}`
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }

        // Ensure breeds are populated even if fetch fails

        // Initialize breeds on page load
        document.addEventListener("DOMContentLoaded", function() {
            // Wait for external script to load
            setTimeout(function() {
                if (typeof breeds !== 'undefined' && document.getElementById('breed1').options.length <= 1) {
                    populateSelectors();
                    applyUrlParams();
                }
            }, 100);
        });
    </script>
</body>
